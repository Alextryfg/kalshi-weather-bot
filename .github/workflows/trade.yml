# ─── CORRECCIÓN CRÍTICA DEL WORKFLOW ─────────────────────────────────────────
# Guardar como: .github/workflows/trade.yml
#
# BUG ORIGINAL: cache key "bot-db-stable-v1" era inmutable → DB reseteaba cada run
# FIX: Usar run_id en la key + restore-keys para encontrar la cache más reciente
# ─────────────────────────────────────────────────────────────────────────────

name: kalshi-weather-bot

on:
  schedule:
    - cron: '*/30 * * * *'   # cada 30 minutos
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # ── CACHE FIX ─────────────────────────────────────────────────────────
      # KEY: Incluye run_id → crea NUEVA entrada cada run (nunca sobrescribe)
      # RESTORE-KEYS: Prefijo → encuentra automáticamente la entrada más reciente
      # RESULTADO: El historial de DB persiste correctamente entre runs
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/bot.db
          key: bot-db-v2-${{ github.run_id }}
          restore-keys: |
            bot-db-v2-

      - name: Create data dir
        run: mkdir -p data

      - name: Run bot
        env:
          EXECUTION_MODE: simulation
          # ─── Risk parameters (calibrados post-bug-fix) ─────────────────────
          MIN_EDGE_PP: "5.0"
          KELLY_FRACTION: "0.25"
          MAX_TRADE_FRACTION: "0.02"
          STOP_LOSS_PP: "8.0"
          MIN_ORDERBOOK_DEPTH: "20"    # ← bajado de 50 (liquidez real del mercado)
          MAX_PRICE_CENTS: "92"        # ← subido de 90 (permite limit 91¢)
          MAX_POSITION_FRACTION: "0.10"
          DAILY_LOSS_CAP_FRACTION: "0.10"
          MIN_HOURS_TO_SETTLEMENT: "6"
          # ─── Feature flags ─────────────────────────────────────────────────
          ENABLE_ENSEMBLE: "true"
          ENABLE_BIAS_CORRECTION: "true"
          ENABLE_METAR: "true"
          # ─── Cities ────────────────────────────────────────────────────────
          WEATHER_CITIES: "New York,Chicago,Los Angeles,Houston,Miami,Denver,Minneapolis,San Francisco,Philadelphia,Dallas,Atlanta"
          # ─── Kalshi (demo endpoint, no key needed) ─────────────────────────
          KALSHI_API_BASE: "https://demo-api.kalshi.co/trade-api/v2"
          DB_PATH: "./data/bot.db"
          LOG_LEVEL: "info"
        run: npx ts-node src/bot.ts

      - name: Upload summary to pages
        run: |
          git config user.email "bot@github"
          git config user.name "Kalshi Bot"
          git add docs/summary.json
          git diff --staged --quiet || git commit -m "bot: update summary [skip ci]"
          git push