name: kalshi-weather-trade

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: false
        default: "simulation"
        type: choice
        options: [simulation, live]
      reset_sim:
        description: "Reset simulation DB (start fresh from $1000)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  actions: read
  pages: write
  id-token: write

concurrency:
  group: kalshi-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      EXECUTION_MODE: ${{ github.event.inputs.mode || 'simulation' }}
      SIM_INITIAL_CAPITAL: "1000"
      KALSHI_API_BASE: ${{ vars.KALSHI_API_BASE || 'https://external-api.demo.kalshi.co/trade-api/v2' }}
      KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
      KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
      WEATHER_CITIES: ${{ vars.WEATHER_CITIES || 'New York,Chicago,Los Angeles,Houston,Miami,Denver,Minneapolis,San Francisco,Philadelphia,Dallas,Atlanta' }}
      MIN_EDGE_PP: "5.0"
      KELLY_FRACTION: "0.25"
      MAX_TRADE_FRACTION: "0.02"
      STOP_LOSS_PP: "8.0"
      MIN_ORDERBOOK_DEPTH: "20"
      MAX_VOLATILITY_PP_1H: "20"
      MAX_POSITION_FRACTION: "0.10"
      DAILY_LOSS_CAP_FRACTION: "0.10"
      MIN_HOURS_TO_SETTLEMENT: "6"
      MIN_PRICE_CENTS: "10"
      MAX_PRICE_CENTS: "92"
      ENABLE_ENSEMBLE: "true"
      ENABLE_BIAS_CORRECTION: "true"
      ENABLE_METAR: "true"
      DB_PATH: ./data/bot.db
      LOG_LEVEL: info

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # ── Restore DB from stable cache key (not run-id!) ──────────────────────
      # Using a FIXED key prefix means the same DB survives across runs.
      # Without this, every run started fresh and positions never settled.
      - name: Restore DB cache
        id: dbcache
        uses: actions/cache@v4
        with:
          path: ./data
          key: bot-db-stable-v1
          restore-keys: |
            bot-db-stable-

      - name: Run bot
        run: |
          mkdir -p data docs
          RESET_FLAG=""
          if [ "${{ github.event.inputs.reset_sim }}" = "true" ]; then
            RESET_FLAG="--reset-sim"
            echo "🔄 Reset sim requested — starting fresh from $1000"
          fi
          if [ "$EXECUTION_MODE" = "live" ]; then
            npx ts-node src/bot.ts --live $RESET_FLAG
          else
            npx ts-node src/bot.ts $RESET_FLAG
          fi

      - name: Commit summary.json to docs/
        if: always()
        run: |
          git config user.name "kalshi-bot"
          git config user.email "bot@kalshi-weather"
          git add docs/summary.json || true
          git diff --staged --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push || true

      # ── Save DB with SAME stable key so next run restores it ─────────────────
      - name: Save DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./data
          key: bot-db-stable-v1

      - name: Upload artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-run-${{ github.run_id }}
          path: data/
          retention-days: 30
          if-no-files-found: warn
