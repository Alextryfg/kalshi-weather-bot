name: kalshi-weather-trade

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: false
        default: "simulation"
        type: choice
        options: [simulation, live]

permissions:
  contents: write   # needed to commit summary.json to docs/
  actions: read
  pages: write
  id-token: write

concurrency:
  group: kalshi-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      EXECUTION_MODE: ${{ github.event.inputs.mode || 'simulation' }}
      SIM_INITIAL_CAPITAL: "1000"
      KALSHI_API_BASE: ${{ vars.KALSHI_API_BASE || 'https://external-api.demo.kalshi.co/trade-api/v2' }}
      KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
      KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
      WEATHER_CITIES: ${{ vars.WEATHER_CITIES || 'New York,Chicago' }}
      MIN_EDGE_PP: "5.0"         # antes 0.5
      KELLY_FRACTION: "0.25"     # quarter Kelly no half antes 0.5
      MAX_TRADE_FRACTION: "0.02" # 2% no 5%antes 0.05
      STOP_LOSS_PP: "8.0"        # mids no apretarantes 2.0
      MIN_ORDERBOOK_DEPTH: "50"
      MAX_VOLATILITY_PP_1H: "20"
      MAX_POSITION_FRACTION: "0.10"
      DAILY_LOSS_CAP_FRACTION: "0.10"
      MIN_HOURS_TO_SETTLEMENT: "6"
      DB_PATH: ./data/bot.db
      LOG_LEVEL: info

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Restore DB cache
        id: dbcache
        uses: actions/cache@v4
        with:
          path: ./data
          key: bot-db-${{ github.run_id }}
          restore-keys: |
            bot-db-

      - name: Run bot
        run: |
          mkdir -p data docs
          if [ "$EXECUTION_MODE" = "live" ]; then
            npx ts-node src/bot.ts --live
          else
            npx ts-node src/bot.ts
          fi

      - name: Commit summary.json to docs/
        if: always()
        run: |
          git config user.name "kalshi-bot"
          git config user.email "bot@kalshi-weather"
          git add docs/summary.json || true
          git diff --staged --quiet || git commit -m "chore: update dashboard [skip ci]"
          git push || true

      - name: Save DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./data
          key: bot-db-${{ github.run_id }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-run-${{ github.run_id }}
          path: data/
          retention-days: 14
          if-no-files-found: warn
